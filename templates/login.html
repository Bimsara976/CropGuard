{% extends "base.html" %}
{% block title %}Login — CropGuard{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-circle">
        <svg viewBox="0 0 24 24"><path d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2>Welcome Back</h2>
      <p>Sign in to your CropGuard account</p>
    </div>

    <!-- Form -->
    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-control"
          placeholder="Enter your username"
          value="{{ form_data.get('username', '') }}"
          required
          autocomplete="username"
          autofocus
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="login-password"
          name="password"
          class="form-control"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem;">
        Sign In
      </button>
    </form>

    <p class="auth-footer">
      Don&apos;t have an account?
      <a href="{{ url_for('register') }}">Create one here</a>
    </p>

  </div>
</div>
{% endblock %}
